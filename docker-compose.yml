services:
    api:
        container_name: fastapi-app
        tty: true
        build:
            context: .
            dockerfile: ./docs/py/Dockerfile
        volumes:
            - ./app:/app
        command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
        ports:
            - "8001:8000"
        networks:
            - app-network

    postgres:
        container_name: postgres-db
        image: postgres:17
        environment:
            - POSTGRES_USER=root
            - POSTGRES_PASSWORD=rootAbC123
            - POSTGRES_DB=app_db
        volumes:
            - postgres-data:/var/lib/postgresql/data
        ports:
            - "54328:5432"
        networks:
            - app-network
networks:
    app-network:
        driver: "bridge"

volumes:
    postgres-data: